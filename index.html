<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MULT POP — mybumo games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1428;--bg-card:#0f1d35;--bg-card-2:#13233f;
  --cyan:#4dd0ff;--orange:#f78a3a;--border:rgba(77,208,255,0.5);
  --border-soft:rgba(77,208,255,0.18);--text:#e8f1fb;--text-dim:#8aa0bd;
  --text-faint:#5a7290;--green:#4ade80;--amber:#fbbf24;--radius:14px;
  --teal:#5DCAA5;--teal-dark:#1D9E75;--purple:#7F77DD;--purple-light:#AFA9EC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,0.7),transparent),radial-gradient(1px 1px at 60% 70%,rgba(255,255,255,0.5),transparent),radial-gradient(1px 1px at 80% 20%,rgba(255,255,255,0.6),transparent),radial-gradient(1px 1px at 35% 80%,rgba(255,255,255,0.4),transparent),radial-gradient(2px 2px at 90% 60%,rgba(77,208,255,0.5),transparent);background-size:600px 600px;pointer-events:none;z-index:0}
.particle{position:fixed;pointer-events:none;z-index:100;font-size:22px;animation:particleFly .9s ease-out forwards}
@keyframes particleFly{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-120px) scale(0.3);opacity:0}}
.score-pop{position:fixed;pointer-events:none;z-index:100;font-size:26px;font-weight:900;color:var(--amber);text-shadow:0 0 10px rgba(251,191,36,0.8);animation:scorePop .7s ease-out forwards}
@keyframes scorePop{0%{transform:translateY(0) scale(1.3);opacity:1}100%{transform:translateY(-80px) scale(0.8);opacity:0}}
.combo-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:200;text-align:center;pointer-events:none}
.combo-banner.show{animation:comboPop .65s ease-out forwards}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(0.4);opacity:0}45%{transform:translate(-50%,-50%) scale(1.15);opacity:1}70%{transform:translate(-50%,-50%) scale(0.95)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.combo-text{font-size:52px;font-weight:900;letter-spacing:-1px;text-shadow:0 0 30px currentColor}
.flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
.flash.correct-flash{background:rgba(93,202,165,0.15);animation:flashAnim .4s ease-out}
.flash.wrong-flash{background:rgba(247,138,58,0.15);animation:flashAnim .4s ease-out}
@keyframes flashAnim{0%{opacity:1}100%{opacity:0}}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:16px 16px 60px}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border-soft)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.brand-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--cyan),var(--orange));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:var(--bg)}
.brand-name{font-weight:900;font-size:15px}
.brand-sub{font-size:10px;color:var(--text-faint)}
.header-right{display:flex;align-items:center;gap:8px}
.lang-btn,.back-btn{font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;background:transparent;border:1px solid var(--border-soft);color:var(--text-dim);padding:6px 12px;border-radius:9px;transition:all .15s;text-decoration:none;display:inline-block}
.lang-btn:hover,.back-btn:hover{border-color:var(--border);color:var(--cyan)}

/* ── Character Card ── */
.char-section{background:var(--bg-card);border:2px solid var(--border-soft);border-radius:16px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;transition:border-color .4s,box-shadow .4s}
.char-section.glow{box-shadow:0 0 18px -4px var(--glow-color,rgba(77,208,255,0.4))}
.char-img-wrap{position:relative;flex-shrink:0}
.char-img{width:88px;height:88px;object-fit:contain;border-radius:12px;transition:transform .3s}
.char-img.bounce{animation:charBounce .45s ease-out}
.char-img.shake{animation:charShake .4s ease-out}
.char-img.excited-anim{animation:charExcited .5s ease-out}
@keyframes charBounce{0%{transform:scale(1)}30%{transform:scale(1.3) rotate(-8deg)}60%{transform:scale(0.92) rotate(4deg)}100%{transform:scale(1)}}
@keyframes charShake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes charExcited{0%{transform:scale(1)}25%{transform:scale(1.25) rotate(-12deg)}50%{transform:scale(1.1) rotate(8deg)}75%{transform:scale(1.2) rotate(-5deg)}100%{transform:scale(1)}}
.char-mood-badge{position:absolute;top:-7px;right:-7px;font-size:17px;background:var(--bg);border-radius:50%;width:27px;height:27px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-soft)}
.char-info{flex:1;min-width:0}
.char-name{font-size:16px;font-weight:900;margin-bottom:1px}
.char-type{font-size:10px;color:var(--text-faint);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.char-mood-text{font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:7px;min-height:15px}
.xp-bar-wrap{height:7px;background:var(--bg-card-2);border-radius:4px;overflow:hidden;border:1px solid var(--border-soft);margin-bottom:4px}
.xp-bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.xp-label{font-size:10px;color:var(--text-faint);font-weight:700;margin-bottom:6px}
.char-pips{display:flex;gap:4px;align-items:center}
.pip{width:7px;height:7px;border-radius:50%;background:var(--bg-card-2);border:1px solid var(--border-soft);transition:all .3s;flex-shrink:0}
.pip.done{background:var(--teal);border-color:var(--teal)}
.pip.current{background:var(--cyan);border-color:var(--cyan);transform:scale(1.35)}

/* ── Stars & Stickers ── */
.stars-row{display:flex;justify-content:center;gap:4px;margin-bottom:11px;min-height:24px}
.star{font-size:19px;opacity:.2;filter:grayscale(1)}
.star.earned{opacity:1;filter:none;animation:starEarn .5s ease-out}
@keyframes starEarn{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.4) rotate(10deg)}100%{transform:scale(1)}}
.sticker-shelf{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:13px;min-height:32px}
.sticker{font-size:22px;opacity:.15;filter:grayscale(1);transform:scale(.7);transition:all .3s}
.sticker.earned{opacity:1;filter:none;transform:scale(1);animation:stickerPop .4s ease-out}
@keyframes stickerPop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}

/* ── Stage Tabs ── */
.stage-tabs{display:flex;gap:7px;margin-bottom:13px}
.stage-tab{flex:1;padding:9px 5px;border:1px solid var(--border-soft);border-radius:11px;background:transparent;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:var(--text-dim);text-align:center;transition:all .15s}
.stage-tab:hover{border-color:var(--border);color:var(--text)}
.stage-tab.active{background:rgba(77,208,255,.12);color:var(--cyan);border-color:var(--border)}
.stage-tab .ti{font-size:15px;display:block;margin-bottom:2px}
.stage-tab .tl{font-size:9px;color:var(--text-faint);display:block;margin-top:1px}

/* ── Score Bar ── */
.score-bar{display:flex;gap:8px;margin-bottom:13px}
.score-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;padding:9px 10px;flex:1;text-align:center}
.score-card.pulse{animation:cardPulse .3s ease-out}
@keyframes cardPulse{0%{transform:scale(1)}50%{transform:scale(1.08);border-color:var(--amber)}100%{transform:scale(1)}}
.score-card .sl{font-size:9px;color:var(--text-faint);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.score-card .sv{font-size:20px;font-weight:900}
.score-card.combo-active .sv{color:var(--amber);text-shadow:0 0 8px rgba(251,191,36,.5)}
.progress-wrap{height:5px;background:var(--bg-card);border-radius:3px;margin-bottom:13px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--cyan));border-radius:3px;transition:width .4s ease}
.problem-display{text-align:center;font-size:36px;font-weight:900;letter-spacing:3px;margin-bottom:13px;text-shadow:0 0 20px rgba(77,208,255,.3)}

/* ── Concrete ── */
.c-label{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:9px}
.groups-wrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:13px}
.block-group{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:10px;padding:8px}
.g-lbl{font-size:9px;color:var(--text-faint);font-weight:700;text-align:center;margin-bottom:4px}
.dots-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:100px}
.dot{width:15px;height:15px;border-radius:50%;background:rgba(93,202,165,.3);border:1px solid var(--teal);cursor:pointer;transition:all .1s}
.dot.counted{background:var(--teal-dark);border-color:var(--teal-dark);transform:scale(1.2)}

/* ── Pictorial ── */
.bar-desc{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:7px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bar-num{font-size:10px;color:var(--text-faint);font-weight:700;width:16px;text-align:right}
.bar-fill{height:21px;border-radius:4px;background:rgba(175,169,236,.35);border:1px solid var(--purple);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;font-weight:700;color:var(--purple-light);min-width:20px}
.area-section{display:flex;justify-content:center;margin-bottom:13px}
.area-lbl{font-size:11px;color:var(--text-dim);margin-bottom:5px;text-align:center}
.area-grid{display:inline-grid;gap:2px}
.area-cell{border-radius:3px;background:rgba(55,138,221,.18);border:1px solid rgba(55,138,221,.35);cursor:pointer;transition:background .08s}
.area-cell.filled{background:rgba(55,138,221,.65);border-color:var(--cyan)}

/* ── Number Bonds ── */
.nb-wrap{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;padding:12px;margin-bottom:11px}
.nb-title{font-size:10px;font-weight:700;color:var(--text-faint);letter-spacing:.05em;margin-bottom:7px}
.nb-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nb-box{background:var(--bg-card-2);border:1px solid var(--border-soft);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700}
.nb-box.hi{background:rgba(93,202,165,.18);border-color:var(--teal);color:var(--teal)}
.nb-plus{color:var(--text-faint);font-size:15px;font-weight:900}
.hint-link{font-size:12px;color:var(--text-faint);cursor:pointer;text-decoration:underline;text-align:center;display:block;margin-bottom:9px;font-weight:700}

/* ── Numpad ── */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.nk{font-family:inherit;font-size:20px;font-weight:900;padding:13px;border-radius:11px;border:1px solid var(--border-soft);background:var(--bg-card);cursor:pointer;color:var(--text);transition:all .1s;-webkit-tap-highlight-color:transparent}
.nk:hover{background:var(--bg-card-2);border-color:var(--border)}
.nk:active{transform:scale(.91);background:rgba(77,208,255,.1)}
.answer-row{display:flex;gap:9px;align-items:center;margin-bottom:9px}
.answer-input{flex:1;text-align:center;font-family:inherit;font-size:28px;font-weight:900;padding:11px;border-radius:11px;border:1px solid var(--border-soft);background:var(--bg-card);color:var(--text)}
.answer-input:focus{outline:none;border-color:var(--cyan)}
.check-btn{font-family:inherit;font-weight:900;font-size:14px;padding:11px 20px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--cyan);cursor:pointer;transition:all .15s;white-space:nowrap}
.check-btn:hover{background:rgba(77,208,255,.12)}
.check-btn:active{transform:scale(.95)}
.feedback{text-align:center;font-size:19px;font-weight:900;min-height:27px;margin-bottom:9px}
.feedback.ok{color:var(--teal)}
.feedback.ng{color:var(--orange)}
.next-btn{width:100%;font-family:inherit;font-size:15px;font-weight:900;padding:13px;border-radius:11px;border:1px solid var(--border);background:rgba(77,208,255,.08);color:var(--cyan);cursor:pointer;display:none;transition:all .15s}
.next-btn:hover{background:rgba(77,208,255,.16)}

/* ── Result ── */
.result-wrap{text-align:center;padding:1.5rem 0}
.result-char-img{width:120px;height:120px;object-fit:contain;margin:0 auto 12px;display:block;animation:charBounce .6s ease-out}
.result-title{font-size:26px;font-weight:900;margin-bottom:6px}
.result-sub{font-size:14px;color:var(--text-dim);margin-bottom:12px}
.result-stars{font-size:20px;letter-spacing:2px;margin-bottom:10px}
.result-stickers{font-size:26px;letter-spacing:4px;margin-bottom:14px}
.result-stat{display:inline-block;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:12px;padding:12px 28px;margin-bottom:14px}
.result-stat .rs-l{font-size:11px;color:var(--text-faint);font-weight:700}
.result-stat .rs-v{font-size:26px;font-weight:900}
.replay-btn{font-family:inherit;font-size:15px;font-weight:900;padding:12px 26px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--cyan);cursor:pointer;margin-right:8px;transition:all .15s}
.replay-btn:hover{background:rgba(77,208,255,.12)}
.hub-btn{font-family:inherit;font-size:15px;font-weight:900;padding:12px 22px;border-radius:11px;border:1px solid var(--border-soft);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block}
.hub-btn:hover{color:var(--text);border-color:var(--border)}
.sound-toggle{position:fixed;bottom:20px;right:20px;z-index:10;font-size:20px;width:42px;height:42px;border-radius:50%;border:1px solid var(--border-soft);background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sound-toggle:hover{border-color:var(--border)}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="combo-banner" id="comboBanner"><div class="combo-text" id="comboText"></div></div>
<button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

<div class="wrap">
  <header>
    <a class="brand" href="https://game.mybumo.com">
      <div class="brand-logo">m</div>
      <div><div class="brand-name">game.mybumo</div><div class="brand-sub">mybumo game hub</div></div>
    </a>
    <div class="header-right">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">한국어</button>
      <a class="back-btn" href="https://game.mybumo.com">← Hub</a>
    </div>
  </header>

  <!-- Character Card -->
  <div class="char-section" id="charSection">
    <div class="char-img-wrap">
      <img class="char-img" id="charImg" src="zip.png" alt="character">
      <div class="char-mood-badge" id="moodBadge">😊</div>
    </div>
    <div class="char-info">
      <div class="char-name" id="charName">Zip</div>
      <div class="char-type" id="charType">Little Robot</div>
      <div class="char-mood-text" id="charMoodText"></div>
      <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
      <div class="xp-label" id="xpLabel"></div>
      <div class="char-pips" id="charPips"></div>
    </div>
  </div>

  <div class="stars-row" id="starsRow"></div>
  <div class="sticker-shelf" id="stickerShelf"></div>

  <div id="game-area">
    <div class="stage-tabs">
      <button class="stage-tab active" id="tab-0" onclick="setStage(0)">
        <span class="ti">🟢</span><span data-i18n="stageC">Concrete</span><span class="tl" data-i18n="stageCsub">Objects</span>
      </button>
      <button class="stage-tab" id="tab-1" onclick="setStage(1)">
        <span class="ti">📊</span><span data-i18n="stageP">Pictorial</span><span class="tl" data-i18n="stagePsub">Picture</span>
      </button>
      <button class="stage-tab" id="tab-2" onclick="setStage(2)">
        <span class="ti">🔢</span><span data-i18n="stageA">Abstract</span><span class="tl" data-i18n="stageAsub">Numbers</span>
      </button>
    </div>
    <div class="score-bar">
      <div class="score-card" id="card-correct"><div class="sl" data-i18n="labelCorrect">CORRECT</div><div class="sv" id="sc-correct">0</div></div>
      <div class="score-card"><div class="sl" data-i18n="labelQ">QUESTION</div><div class="sv" id="sc-q">1 / 10</div></div>
      <div class="score-card" id="card-streak"><div class="sl" data-i18n="labelStreak">STREAK</div><div class="sv" id="sc-streak">🔥 0</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="problem-display" id="prob-display"></div>

    <div id="stage-c">
      <div class="c-label" id="c-label"></div>
      <div class="groups-wrap" id="c-groups"></div>
    </div>
    <div id="stage-p" style="display:none">
      <div class="bar-desc" id="bar-desc"></div>
      <div id="bar-rows" style="margin-bottom:11px"></div>
      <div class="area-section">
        <div><div class="area-lbl" id="area-lbl"></div><div class="area-grid" id="area-grid"></div></div>
      </div>
    </div>
    <div id="stage-a" style="display:none"></div>

    <div id="nb-wrap" class="nb-wrap" style="display:none">
      <div class="nb-title" data-i18n="hintTitle">💡 Number Bonds Hint</div>
      <div class="nb-row" id="nb-row"></div>
    </div>
    <span class="hint-link" id="hint-btn" onclick="toggleHint()"></span>
    <div class="numpad" id="numpad"></div>
    <div class="answer-row">
      <input class="answer-input" id="ans" type="number" inputmode="numeric" placeholder="?">
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()">Check ✓</button>
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

(async()=>{try{await db.from('hub_clicks').insert({game:'multpop',visitor_id:getVid()});}catch(e){}})();

// ── i18n ──
let lang=localStorage.getItem(LANG_KEY)||'en';
const STR={
  en:{
    stageC:'Concrete',stageCsub:'Objects',stageP:'Pictorial',stagePsub:'Picture',stageA:'Abstract',stageAsub:'Numbers',
    labelCorrect:'CORRECT',labelQ:'QUESTION',labelStreak:'STREAK',
    hintTitle:'💡 Number Bonds Hint',hintShow:'Show hint (Number Bonds)',hintHide:'Hide hint',
    checkBtn:'Check ✓',nextBtn:'Next →',finishBtn:'Results 🏁',
    cLabel:'{a} dots × {b} groups — tap to count!',
    barDesc:'{b} bars of size {a}',areaLbl:'Area model: {b} cols × {a} rows',
    feedCorrect:['Correct! 🎉','Perfect! ✨','Amazing! 🌟','Nice! 👍','Nailed it! 🏆'],
    feedWrong:'So close! Answer is {ans} 💪',enterNum:'Please enter a number',
    combo3:'3 in a row! 🔥',combo5:'5 Combo! 💎',combo7:'7 Combo! 🚀',combo10:'PERFECT! 🏆',
    evolved:'EVOLVED! ✨',xpLabel:'XP {cur} / {max}',
    resultTitle:'{correct} / {total} correct!',
    resultSub:['Singapore Math Master! 🎓','Great work! Keep going!','Practice makes perfect 😊'],
    resultAccuracy:'Accuracy',replayBtn:'Play Again',hubBtn:'← Hub',langToggle:'한국어',
    chars:[

// ── Characters (Zip→Pebble→Sprout→Ember→Puff→Droplet→Twinkle) ──
const CHARS=[
  {img:'zip.png',    color:'#60a5fa', xp:15},
  {img:'pebble.png', color:'#9ca3af', xp:25},
  {img:'sprout.png', color:'#4ade80', xp:35},
  {img:'ember.png',  color:'#f97316', xp:50},
  {img:'puff.png',   color:'#c4d8f5', xp:65},
  {img:'droplet.png',color:'#38bdf8', xp:80},
  {img:'twinkle.png',color:'#fbbf24', xp:9999},
];
const MOODS=[{key:'idle',badge:'😊'},{key:'happy',badge:'😄'},{key:'curious',badge:'🤔'},{key:'excited',badge:'🤩'},{key:'wrong',badge:'😅'}];
let xp=0,charLevel=0,currentMood='idle';

function getMood(streak,ok){
  if(!ok)return'wrong';
  if(streak>=5)return'excited';
  if(streak>=2)return'happy';
  return'happy';
}
function setMood(mood){
  currentMood=mood;
  const m=MOODS.find(x=>x.key===mood)||MOODS[0];
  document.getElementById('moodBadge').textContent=m.badge;
  document.getElementById('charMoodText').textContent=t('chars')[charLevel].moods[mood]||'';
}
function addXP(amount){
  xp+=amount;
  if(xp>=CHARS[charLevel].xp&&charLevel<CHARS.length-1){charLevel++;evolveChar();}
  updateCharUI();
}
function evolveChar(){
  playLevelUp();
  showComboBanner(t('evolved'),'#fbbf24');
  spawnParticles(['⭐','✨','🌟','💫','🎉'],window.innerWidth/2,window.innerHeight/3,18);
  const img=document.getElementById('charImg');
  img.classList.remove('excited-anim');void img.offsetWidth;img.classList.add('excited-anim');
}
function updateCharUI(){
  const c=CHARS[charLevel];
  const prev=charLevel>0?CHARS[charLevel-1].xp:0;
  const needed=c.xp-prev;
  const cur=Math.min(xp-prev,needed);
  const pct=Math.min(cur/needed*100,100);
  const cd=t('chars')[charLevel];
  document.getElementById('charImg').src=c.img;
  document.getElementById('charName').textContent=cd.name;
  document.getElementById('charType').textContent=cd.type;
  document.getElementById('charMoodText').textContent=cd.moods[currentMood]||cd.moods.idle;
  const bar=document.getElementById('xpBar');
  bar.style.width=pct+'%';
  bar.style.background=`linear-gradient(90deg,${c.color}99,${c.color})`;
  document.getElementById('xpLabel').textContent=tf('xpLabel',{cur,max:needed});
  const sec=document.getElementById('charSection');
  sec.style.setProperty('--glow-color',c.color+'66');
  sec.style.borderColor=c.color+'88';
  // pips
  document.getElementById('charPips').innerHTML=
    CHARS.map((_,i)=>`<div class="pip ${i<charLevel?'done':i===charLevel?'current':''}"></div>`).join('');
}
function animChar(type){
  const img=document.getElementById('charImg');
  img.classList.remove('bounce','shake','excited-anim');void img.offsetWidth;img.classList.add(type);
}

// ── Audio ──
let soundOn=true;
const AC=new (window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}
function playTone(f,t,d,v=0.3,dl=0){
  if(!soundOn)return;resumeAC();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.setValueAtTime(f,AC.currentTime+dl);
  g.gain.setValueAtTime(v,AC.currentTime+dl);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dl+d);
  o.start(AC.currentTime+dl);o.stop(AC.currentTime+dl+d+.05);
}
function playCorrect(){playTone(523,'square',.08,.25);playTone(659,'square',.08,.25,.09);playTone(784,'square',.12,.25,.18);playTone(1047,'square',.2,.2,.28);}
function playWrong(){playTone(200,'sawtooth',.12,.3);playTone(160,'sawtooth',.18,.3,.14);}
function playCombo(){[523,659,784,1047,1319].forEach((f,i)=>playTone(f,'square',.1,.28,i*.07));}
function playLevelUp(){[262,330,392,523,659,784,1047].forEach((f,i)=>playTone(f,'square',.15,.3,i*.08));}
function playStar(){playTone(1046,'sine',.15,.3);playTone(1318,'sine',.12,.25,.12);}
function playClick(){playTone(440,'sine',.05,.15);}
function playSticker(){playTone(880,'sine',.1,.25);playTone(1108,'sine',.1,.2,.1);}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔇';}

function spawnParticles(em,x,y,n=8){
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='particle';
    p.textContent=em[Math.floor(Math.random()*em.length)];
    p.style.left=(x+Math.random()*80-40)+'px';p.style.top=(y+Math.random()*40-20)+'px';
    p.style.animationDelay=(Math.random()*.2)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),1100);
  }
}
function spawnScorePop(txt,x,y){
  const p=document.createElement('div');p.className='score-pop';p.textContent=txt;
  p.style.left=x+'px';p.style.top=y+'px';
  document.body.appendChild(p);setTimeout(()=>p.remove(),800);
}
function showComboBanner(txt,color='#4dd0ff'){
  const el=document.getElementById('comboBanner'),tx=document.getElementById('comboText');
  tx.textContent=txt;tx.style.color=color;
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');

let stage=0,correct=0,qNum=1,streak=0,hintVisible=false,answered=false,a=2,b=2;
const problems=Array.from({length:TOTAL},()=>[Math.floor(Math.random()*8)+2,Math.floor(Math.random()*8)+2]);

function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.getAttribute('data-i18n')));
  document.getElementById('langBtn').textContent=t('langToggle');

  const nb=document.getElementById('next-btn');
  if(nb.style.display!=='none')nb.textContent=qNum<TOTAL?t('nextBtn'):t('finishBtn');

  if(hintVisible)renderHint();
  if(stage===0)document.getElementById('c-label').textContent=tf('cLabel',{a,b});
  if(stage===1){document.getElementById('bar-desc').textContent=tf('barDesc',{a,b});document.getElementById('area-lbl').textContent=tf('areaLbl',{a,b});}
}
function toggleLang(){lang=lang==='en'?'ko':'en';localStorage.setItem(LANG_KEY,lang);applyLang();}
function setStage(s){playClick();stage=s;[0,1,2].forEach(i=>document.getElementById('tab-'+i).classList.toggle('active',i===s));renderProblem();}

function renderProblem(){
  [a,b]=problems[(qNum-1)%TOTAL];
  document.getElementById('prob-display').textContent=a+' × '+b+' = ?';
  document.getElementById('fb').textContent='';document.getElementById('fb').className='feedback';
  document.getElementById('ans').value='';document.getElementById('ans').disabled=false;
  document.getElementById('next-btn').style.display='none';
  document.getElementById('nb-wrap').style.display='none';
  document.getElementById('hint-btn').textContent=t('hintShow');
  document.getElementById('sc-q').textContent=qNum+' / '+TOTAL;
  document.getElementById('prog').style.width=Math.min(((qNum-1)/TOTAL)*100,100)+'%';
  document.getElementById('card-streak').classList.remove('combo-active');
  hintVisible=false;answered=false;
  setMood('idle');
  if(stage===0)renderConcrete();else if(stage===1)renderPictorial();else renderAbstract();
}

function renderConcrete(){
  document.getElementById('stage-c').style.display='block';
  document.getElementById('stage-p').style.display='none';
  document.getElementById('stage-a').style.display='none';
  document.getElementById('c-label').textContent=tf('cLabel',{a,b});
  const gc=document.getElementById('c-groups');gc.innerHTML='';
  for(let g=0;g<b;g++){
    const grp=document.createElement('div');grp.className='block-group';
    const lbl=document.createElement('div');lbl.className='g-lbl';lbl.textContent=g+1;grp.appendChild(lbl);
    const dr=document.createElement('div');dr.className='dots-row';
    for(let d=0;d<a;d++){
      const dot=document.createElement('div');dot.className='dot';
      dot.addEventListener('click',function(){playClick();this.classList.toggle('counted');document.getElementById('ans').value=document.querySelectorAll('.dot.counted').length||'';});
      dr.appendChild(dot);
    }
    grp.appendChild(dr);gc.appendChild(grp);
  }
  buildNumpad();
}

function renderPictorial(){
  document.getElementById('stage-c').style.display='none';
  document.getElementById('stage-p').style.display='block';
  document.getElementById('stage-a').style.display='none';
  document.getElementById('bar-desc').textContent=tf('barDesc',{a,b});
  const br=document.getElementById('bar-rows');br.innerHTML='';
  const uw=Math.min(Math.floor(300/Math.max(a,1)),26);
  for(let i=0;i<b;i++){
    const row=document.createElement('div');row.className='bar-row';
    const n=document.createElement('div');n.className='bar-num';n.textContent=i+1;
    const bar=document.createElement('div');bar.className='bar-fill';
    bar.style.width=Math.max(uw*a,24)+'px';bar.textContent=a;
    row.appendChild(n);row.appendChild(bar);br.appendChild(row);
  }
  const grid=document.getElementById('area-grid');
  const cs=Math.min(21,Math.floor(480/Math.max(b,1)));
  grid.style.gridTemplateColumns='repeat('+b+', '+cs+'px)';
  document.getElementById('area-lbl').textContent=tf('areaLbl',{a,b});
  grid.innerHTML='';
  for(let idx=0;idx<a*b;idx++){
    const cell=document.createElement('div');cell.className='area-cell';
    cell.style.width=cs+'px';cell.style.height=cs+'px';cell.dataset.idx=idx;
    cell.addEventListener('click',function(){
      playClick();const cl=parseInt(this.dataset.idx);
      document.querySelectorAll('.area-cell').forEach(c=>parseInt(c.dataset.idx)<=cl?c.classList.add('filled'):c.classList.remove('filled'));
      document.getElementById('ans').value=cl+1;
    });
    grid.appendChild(cell);
  }
  buildNumpad();
}

function renderAbstract(){
  document.getElementById('stage-c').style.display='none';
  document.getElementById('stage-p').style.display='none';
  document.getElementById('stage-a').style.display='block';
  buildNumpad();
}

function buildNumpad(){
  const np=document.getElementById('numpad');np.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','0','00','⌫'].forEach(k=>{
    const btn=document.createElement('button');btn.className='nk'+(k==='⌫'?' del':'');btn.textContent=k;
    btn.addEventListener('click',()=>{
      if(answered)return;playClick();
      const inp=document.getElementById('ans');
      if(k==='⌫')inp.value=inp.value.slice(0,-1);
      else inp.value=(inp.value+k).replace(/^0+(\d)/,'$1');
    });
    np.appendChild(btn);
  });
}

function getNBonds(){
  let sp1,sp2;
  if(b>=6){sp1=5;sp2=b-5;}else if(b>=4){sp1=2;sp2=b-2;}else{sp1=1;sp2=b-1;}
  return{sp1,sp2,r1:a*sp1,r2:a*sp2};
}
function renderHint(){
  const{sp1,sp2,r1,r2}=getNBonds();
  document.getElementById('nb-row').innerHTML=
    `<div class="nb-box">${a}×${b}</div><div class="nb-plus">=</div>`+
    `<div class="nb-box">${a}×${sp1}</div><div class="nb-plus">+</div><div class="nb-box">${a}×${sp2}</div>`+
    `<div class="nb-plus">=</div><div class="nb-box hi">${r1}</div><div class="nb-plus">+</div>`+
    `<div class="nb-box hi">${r2}</div><div class="nb-plus">=</div><div class="nb-box hi">${r1+r2}</div>`;
  document.querySelector('.nb-title').textContent=t('hintTitle');
}
function toggleHint(){
  hintVisible=!hintVisible;
  document.getElementById('nb-wrap').style.display=hintVisible?'block':'none';
  document.getElementById('hint-btn').textContent=hintVisible?t('hintHide'):t('hintShow');
  if(hintVisible)renderHint();
}

function checkAnswer(){
  if(answered)return;resumeAC();
  const val=parseInt(document.getElementById('ans').value);
  const fb=document.getElementById('fb');
  if(isNaN(val)){fb.textContent=t('enterNum');fb.className='feedback ng';return;}
  answered=true;document.getElementById('ans').disabled=true;

  if(val===a*b){
    correct++;streak++;
    document.getElementById('sc-correct').textContent=correct;
    document.getElementById('sc-streak').textContent='🔥 '+streak;
    setMood(getMood(streak,true));
    animChar(streak>=5?'excited-anim':'bounce');
    const xpGain=streak>=3?15:10;addXP(xpGain);
    earnStar(correct-1);
    const rect=document.getElementById('ans').getBoundingClientRect();
    spawnScorePop(streak>=3?'+'+xpGain+' XP ⚡':'+'+xpGain+' XP',rect.left+rect.width/2,rect.top);
    const em=streak>=5?['🌟','💎','🎉','✨']:streak>=3?['⭐','🔥','✨']:['⭐','✨'];
    spawnParticles(em,rect.left+rect.width/2,rect.top,streak>=3?12:7);
    if(streak===3){playCombo();showComboBanner(t('combo3'),'#f78a3a');}
    else if(streak===5){playCombo();showComboBanner(t('combo5'),'#a78bfa');}
    else if(streak===7){playCombo();showComboBanner(t('combo7'),'#4dd0ff');}
    else if(streak>=10){playCombo();showComboBanner(t('combo10'),'#fbbf24');}
    else playCorrect();
    if(streak>=3)document.getElementById('card-streak').classList.add('combo-active');
    const msgs=t('feedCorrect');fb.textContent=msgs[Math.floor(Math.random()*msgs.length)];fb.className='feedback ok';
    doFlash('correct-flash');
    if(stage===1)document.querySelectorAll('.area-cell').forEach(c=>c.classList.add('filled'));
  }else{
    streak=0;
    document.getElementById('sc-streak').textContent='🔥 0';
    document.getElementById('card-streak').classList.remove('combo-active');
    setMood('wrong');animChar('shake');
    fb.textContent=tf('feedWrong',{ans:a*b});fb.className='feedback ng';
    playWrong();doFlash('wrong-flash');
    hintVisible=true;document.getElementById('nb-wrap').style.display='block';
    document.getElementById('hint-btn').textContent=t('hintHide');renderHint();addXP(2);
  }
  checkStickers();
  const nb=document.getElementById('next-btn');nb.style.display='block';
  nb.textContent=qNum<TOTAL?t('nextBtn'):t('finishBtn');
  document.getElementById('card-correct').classList.add('pulse');
  setTimeout(()=>document.getElementById('card-correct').classList.remove('pulse'),400);
}

function nextQuestion(){
  playClick();if(qNum>=TOTAL){showResult();return;}qNum++;renderProblem();
}

  const pct=Math.round(correct/TOTAL*100);
  const c=CHARS[charLevel];
  const starsHTML='⭐'.repeat(starsEarned)+'☆'.repeat(TOTAL-starsEarned);
  const stickersHTML=earnedStickers.join(' ');
  const subs=t('resultSub');
  const sub=correct>=8?subs[0]:correct>=5?subs[1]:subs[2];
  if(correct>=8)playLevelUp();else if(correct>=5)playCombo();else playCorrect();
  document.getElementById('game-area').innerHTML=`
    <div class="result-wrap">
      <img class="result-char-img" src="${c.img}" alt="character">
      <div class="result-title">${tf('resultTitle',{correct,total:TOTAL})}</div>
      <div class="result-sub">${sub}</div>
      <div class="result-stars">${starsHTML}</div>
      ${stickersHTML?`<div class="result-stickers">${stickersHTML}</div>`:''}
      <div class="result-stat"><div class="rs-l">${t('resultAccuracy')}</div><div class="rs-v">${pct}%</div></div><br>
      <button class="replay-btn" onclick="location.reload()">${t('replayBtn')}</button>
      <a class="hub-btn" href="https://game.mybumo.com">${t('hubBtn')}</a>
    </div>`;
  spawnParticles(['🌟','⭐','✨','🎉','🏆'],window.innerWidth/2,window.innerHeight/3,18);
}

document.getElementById('ans').addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});
initStars();initStickers();updateCharUI();applyLang();setMood('idle');renderProblem();
</script>
</body>
</html>
