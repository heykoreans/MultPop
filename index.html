<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MULT POP — mybumo games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1428;--bg-card:#0f1d35;--bg-card-2:#13233f;
  --cyan:#4dd0ff;--orange:#f78a3a;--border:rgba(77,208,255,0.5);
  --border-soft:rgba(77,208,255,0.18);--text:#e8f1fb;--text-dim:#8aa0bd;
  --text-faint:#5a7290;--green:#4ade80;--amber:#fbbf24;--radius:14px;
  --teal:#5DCAA5;--teal-dark:#1D9E75;
  --purple-light:#AFA9EC;--purple:#7F77DD;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,0.7),transparent),radial-gradient(1px 1px at 60% 70%,rgba(255,255,255,0.5),transparent),radial-gradient(1px 1px at 80% 20%,rgba(255,255,255,0.6),transparent),radial-gradient(1px 1px at 35% 80%,rgba(255,255,255,0.4),transparent),radial-gradient(2px 2px at 90% 60%,rgba(77,208,255,0.5),transparent);background-size:600px 600px;pointer-events:none;z-index:0}
.particle{position:fixed;pointer-events:none;z-index:100;font-size:22px;animation:particleFly .9s ease-out forwards}
@keyframes particleFly{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-120px) scale(0.3);opacity:0}}
.score-pop{position:fixed;pointer-events:none;z-index:100;font-size:28px;font-weight:900;color:var(--amber);text-shadow:0 0 10px rgba(251,191,36,0.8);animation:scorePop .7s ease-out forwards}
@keyframes scorePop{0%{transform:translateY(0) scale(1.3);opacity:1}100%{transform:translateY(-80px) scale(0.8);opacity:0}}
.combo-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:200;text-align:center;pointer-events:none}
.combo-banner.show{animation:comboPop .6s ease-out forwards}
@keyframes comboPop{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}40%{transform:translate(-50%,-50%) scale(1.2);opacity:1}70%{transform:translate(-50%,-50%) scale(0.95)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.combo-text{font-size:52px;font-weight:900;letter-spacing:-1px;text-shadow:0 0 30px currentColor}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:16px 16px 60px}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border-soft)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.brand-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--cyan),var(--orange));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:var(--bg)}
.brand-name{font-weight:900;font-size:15px}
.brand-sub{font-size:10px;color:var(--text-faint)}
.header-right{display:flex;align-items:center;gap:8px}
.lang-btn{font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;background:transparent;border:1px solid var(--border-soft);color:var(--text-dim);padding:6px 12px;border-radius:9px;transition:all .15s}
.lang-btn:hover{border-color:var(--border);color:var(--cyan)}
.back-btn{font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;border:1px solid var(--border-soft);color:var(--text-dim);padding:6px 13px;border-radius:10px;transition:all .15s;text-decoration:none;display:inline-block}
.back-btn:hover{border-color:var(--border);color:var(--cyan)}
.char-section{text-align:center;margin-bottom:18px}
.char-display{font-size:64px;line-height:1;margin-bottom:6px;display:inline-block}
.char-display.bounce{animation:charBounce .4s ease-out}
@keyframes charBounce{0%{transform:scale(1)}30%{transform:scale(1.4) rotate(-10deg)}60%{transform:scale(0.9) rotate(5deg)}100%{transform:scale(1)}}
.char-name{font-size:13px;font-weight:700;color:var(--cyan)}
.char-level{font-size:11px;color:var(--text-faint);margin-top:2px}
.xp-bar-wrap{width:160px;height:8px;background:var(--bg-card);border-radius:4px;margin:6px auto 0;overflow:hidden;border:1px solid var(--border-soft)}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--cyan));border-radius:4px;transition:width .5s ease}
.stage-tabs{display:flex;gap:7px;margin-bottom:16px}
.stage-tab{flex:1;padding:9px 5px;border:1px solid var(--border-soft);border-radius:11px;background:transparent;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:var(--text-dim);text-align:center;transition:all .15s}
.stage-tab:hover{border-color:var(--border);color:var(--text)}
.stage-tab.active{background:rgba(77,208,255,0.12);color:var(--cyan);border-color:var(--border)}
.stage-tab .ti{font-size:15px;display:block;margin-bottom:2px}
.stage-tab .tl{font-size:9px;color:var(--text-faint);display:block;margin-top:1px}
.score-bar{display:flex;gap:8px;margin-bottom:14px}
.score-card{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;padding:9px 10px;flex:1;text-align:center}
.score-card.pulse{animation:cardPulse .3s ease-out}
@keyframes cardPulse{0%{transform:scale(1)}50%{transform:scale(1.08);border-color:var(--amber)}100%{transform:scale(1)}}
.score-card .sl{font-size:9px;color:var(--text-faint);font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.score-card .sv{font-size:20px;font-weight:900;color:var(--text)}
.score-card.combo-active .sv{color:var(--amber);text-shadow:0 0 8px rgba(251,191,36,0.6)}
.stars-row{display:flex;justify-content:center;gap:6px;margin-bottom:14px;min-height:28px}
.star{font-size:22px;opacity:0.25;filter:grayscale(1)}
.star.earned{opacity:1;filter:none;animation:starEarn .5s ease-out}
@keyframes starEarn{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.4) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.sticker-shelf{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;min-height:36px}
.sticker{font-size:26px;opacity:0.2;filter:grayscale(1);transform:scale(0.7);transition:all .3s}
.sticker.earned{opacity:1;filter:none;transform:scale(1);animation:stickerPop .4s ease-out}
@keyframes stickerPop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.progress-wrap{height:5px;background:var(--bg-card);border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--cyan));border-radius:3px;transition:width .4s ease}
.problem-display{text-align:center;font-size:36px;font-weight:900;letter-spacing:3px;color:var(--text);margin-bottom:16px;text-shadow:0 0 20px rgba(77,208,255,0.3)}
.c-label{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:10px}
.groups-wrap{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:16px}
.block-group{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;padding:9px}
.g-lbl{font-size:9px;color:var(--text-faint);font-weight:700;text-align:center;margin-bottom:5px}
.dots-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:100px}
.dot{width:16px;height:16px;border-radius:50%;background:rgba(93,202,165,0.3);border:1px solid var(--teal);cursor:pointer;transition:all .1s}
.dot.counted{background:var(--teal-dark);border-color:var(--teal-dark);transform:scale(1.2)}
.bar-desc{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:8px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.bar-num{font-size:10px;color:var(--text-faint);font-weight:700;width:16px;text-align:right}
.bar-fill{height:22px;border-radius:4px;background:rgba(175,169,236,0.35);border:1px solid var(--purple);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;font-weight:700;color:var(--purple-light);min-width:20px}
.area-section{display:flex;justify-content:center;margin-bottom:16px}
.area-inner{text-align:center}
.area-lbl{font-size:11px;color:var(--text-dim);margin-bottom:6px}
.area-grid{display:inline-grid;gap:2px}
.area-cell{border-radius:3px;background:rgba(55,138,221,0.18);border:1px solid rgba(55,138,221,0.35);cursor:pointer;transition:background .08s}
.area-cell.filled{background:rgba(55,138,221,0.65);border-color:var(--cyan)}
.nb-wrap{background:var(--bg-card);border:1px solid var(--border-soft);border-radius:11px;padding:13px;margin-bottom:14px}
.nb-title{font-size:10px;font-weight:700;color:var(--text-faint);letter-spacing:0.05em;margin-bottom:9px}
.nb-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nb-box{background:var(--bg-card-2);border:1px solid var(--border-soft);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--text)}
.nb-box.hi{background:rgba(93,202,165,0.18);border-color:var(--teal);color:var(--teal)}
.nb-plus{color:var(--text-faint);font-size:15px;font-weight:900}
.hint-link{font-size:12px;color:var(--text-faint);cursor:pointer;text-decoration:underline;text-align:center;display:block;margin-bottom:10px;font-weight:700}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.nk{font-family:inherit;font-size:20px;font-weight:900;padding:13px;border-radius:11px;border:1px solid var(--border-soft);background:var(--bg-card);cursor:pointer;color:var(--text);transition:all .1s;-webkit-tap-highlight-color:transparent}
.nk:hover{background:var(--bg-card-2);border-color:var(--border)}
.nk:active{transform:scale(0.92);background:rgba(77,208,255,0.1)}
.answer-row{display:flex;gap:9px;align-items:center;margin-bottom:10px}
.answer-input{flex:1;text-align:center;font-family:inherit;font-size:28px;font-weight:900;padding:11px;border-radius:11px;border:1px solid var(--border-soft);background:var(--bg-card);color:var(--text)}
.answer-input:focus{outline:none;border-color:var(--cyan)}
.check-btn{font-family:inherit;font-weight:900;font-size:14px;padding:11px 20px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--cyan);cursor:pointer;transition:all .15s;white-space:nowrap}
.check-btn:hover{background:rgba(77,208,255,0.12)}
.check-btn:active{transform:scale(0.95)}
.feedback{text-align:center;font-size:20px;font-weight:900;min-height:30px;margin-bottom:10px}
.feedback.ok{color:var(--teal)}
.feedback.ng{color:var(--orange)}
.next-btn{width:100%;font-family:inherit;font-size:15px;font-weight:900;padding:13px;border-radius:11px;border:1px solid var(--border);background:rgba(77,208,255,0.08);color:var(--cyan);cursor:pointer;display:none;transition:all .15s}
.next-btn:hover{background:rgba(77,208,255,0.16)}
.flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
.flash.correct-flash{background:rgba(93,202,165,0.15);animation:flashAnim .4s ease-out}
.flash.wrong-flash{background:rgba(247,138,58,0.15);animation:flashAnim .4s ease-out}
@keyframes flashAnim{0%{opacity:1}100%{opacity:0}}
.result-wrap{text-align:center;padding:2rem 0}
.result-char{font-size:80px;margin-bottom:0.5rem;animation:charBounce .6s ease-out}
.result-title{font-size:26px;font-weight:900;margin-bottom:6px}
.result-sub{font-size:15px;color:var(--text-dim);margin-bottom:1rem}
.result-stars{font-size:22px;letter-spacing:2px;margin-bottom:1rem}
.result-stickers{font-size:28px;letter-spacing:6px;margin-bottom:1.5rem}
.result-stat{display:inline-block;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:12px;padding:12px 28px;margin-bottom:1.5rem}
.result-stat .rs-l{font-size:11px;color:var(--text-faint);font-weight:700}
.result-stat .rs-v{font-size:26px;font-weight:900}
.replay-btn{font-family:inherit;font-size:15px;font-weight:900;padding:12px 32px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--cyan);cursor:pointer;margin-right:8px;transition:all .15s}
.replay-btn:hover{background:rgba(77,208,255,0.12)}
.hub-btn{font-family:inherit;font-size:15px;font-weight:900;padding:12px 28px;border-radius:11px;border:1px solid var(--border-soft);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block}
.hub-btn:hover{color:var(--text);border-color:var(--border)}
.sound-toggle{position:fixed;bottom:20px;right:20px;z-index:10;font-family:inherit;font-size:20px;width:42px;height:42px;border-radius:50%;border:1px solid var(--border-soft);background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sound-toggle:hover{border-color:var(--border)}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="combo-banner" id="comboBanner"><div class="combo-text" id="comboText"></div></div>
<button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>

<div class="wrap">
  <header>
    <a class="brand" href="https://game.mybumo.com">
      <div class="brand-logo">m</div>
      <div><div class="brand-name">game.mybumo</div><div class="brand-sub">mybumo game hub</div></div>
    </a>
    <div class="header-right">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">한국어</button>
      <a class="back-btn" href="https://game.mybumo.com">← Hub</a>
    </div>
  </header>

  <div class="char-section">
    <div class="char-display" id="charDisplay">🥚</div>
    <div class="char-name" id="charName"></div>
    <div class="char-level" id="charLevel"></div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
  </div>

  <div class="stars-row" id="starsRow"></div>
  <div class="sticker-shelf" id="stickerShelf"></div>

  <div id="game-area">
    <div class="stage-tabs">
      <button class="stage-tab active" id="tab-0" onclick="setStage(0)">
        <span class="ti">🟢</span><span data-i18n="stageC">Concrete</span><span class="tl" data-i18n="stageCsub">Objects</span>
      </button>
      <button class="stage-tab" id="tab-1" onclick="setStage(1)">
        <span class="ti">📊</span><span data-i18n="stageP">Pictorial</span><span class="tl" data-i18n="stagePsub">Picture</span>
      </button>
      <button class="stage-tab" id="tab-2" onclick="setStage(2)">
        <span class="ti">🔢</span><span data-i18n="stageA">Abstract</span><span class="tl" data-i18n="stageAsub">Numbers</span>
      </button>
    </div>

    <div class="score-bar">
      <div class="score-card" id="card-correct"><div class="sl" data-i18n="labelCorrect">CORRECT</div><div class="sv" id="sc-correct">0</div></div>
      <div class="score-card"><div class="sl" data-i18n="labelQ">QUESTION</div><div class="sv" id="sc-q">1 / 10</div></div>
      <div class="score-card" id="card-streak"><div class="sl" data-i18n="labelStreak">STREAK</div><div class="sv" id="sc-streak">🔥 0</div></div>
    </div>

    <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="problem-display" id="prob-display"></div>

    <div id="stage-c">
      <div class="c-label" id="c-label"></div>
      <div class="groups-wrap" id="c-groups"></div>
    </div>
    <div id="stage-p" style="display:none">
      <div class="bar-desc" id="bar-desc"></div>
      <div id="bar-rows" style="margin-bottom:14px"></div>
      <div class="area-section">
        <div class="area-inner">
          <div class="area-lbl" id="area-lbl"></div>
          <div class="area-grid" id="area-grid"></div>
        </div>
      </div>
    </div>
    <div id="stage-a" style="display:none"></div>

    <div id="nb-wrap" class="nb-wrap" style="display:none">
      <div class="nb-title" data-i18n="hintTitle">💡 Number Bonds Hint</div>
      <div class="nb-row" id="nb-row"></div>
    </div>
    <span class="hint-link" id="hint-btn" onclick="toggleHint()"></span>

    <div class="numpad" id="numpad"></div>
    <div class="answer-row">
      <input class="answer-input" id="ans" type="number" inputmode="numeric" placeholder="?">
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()">Check ✓</button>
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

      {name:"점점 강해지고 있어요!"},
      {name:"오리가 되었어요!"},
      {name:"독수리로 진화했어요!"},
      {name:"유니콘이에요! 최강!"},
    ],
    stickers:[
      {label:'첫 정답!'},
      {label:'3연속!'},
      {label:'5개 달성!'},
      {label:'7개 달성!'},
      {label:'완주!'},
    ],
    resultTitle:'{total}문제 중 {correct}개 정답!',
    resultSub:['싱가포르 수학 마스터! 🎓','잘 하고 있어요! 계속 연습해봐요','조금 더 연습하면 금방 늘어요 😊'],
    resultAccuracy:'정답률',
    replayBtn:'다시 하기',
    hubBtn:'← Hub',
    langToggle:'English',
  }
};

function t(key){ return STR[lang][key] || STR['en'][key] || key; }
function tf(key, vars){
  let s = t(key);
  Object.keys(vars).forEach(k => s = s.replace(new RegExp('{'+k+'}','g'), vars[k]));
  return s;
}

function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    el.textContent = t(k);
  });
  document.getElementById('langBtn').textContent = t('langToggle');
  document.getElementById('hint-btn').textContent = hintVisible ? t('hintHide') : t('hintShow');
  document.getElementById('checkBtn').textContent = t('checkBtn');
  const nb = document.getElementById('next-btn');
  if(nb.style.display !== 'none') nb.textContent = qNum < TOTAL ? t('nextBtn') : t('finishBtn');
  updateCharUI();
  if(hintVisible) renderHint();
  renderProblemLabels();
}

function toggleLang(){
  lang = lang === 'en' ? 'ko' : 'en';
  localStorage.setItem(LANG_KEY, lang);
  applyLang();
}

// ── Audio ──
let soundOn=true;
const AC=new (window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}
function playTone(freq,type,dur,vol=0.3,delay=0){
  if(!soundOn)return;resumeAC();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime+delay);
  g.gain.setValueAtTime(vol,AC.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur+0.05);
}
function playCorrect(){playTone(523,'square',0.08,0.25);playTone(659,'square',0.08,0.25,0.09);playTone(784,'square',0.12,0.25,0.18);playTone(1047,'square',0.2,0.2,0.28);}
function playWrong(){playTone(200,'sawtooth',0.12,0.3);playTone(160,'sawtooth',0.18,0.3,0.14);}
function playCombo(){[523,659,784,1047,1319].forEach((f,i)=>playTone(f,'square',0.1,0.28,i*0.07));}
function playLevelUp(){[262,330,392,523,659,784,1047].forEach((f,i)=>playTone(f,'square',0.15,0.3,i*0.08));}
function playStar(){playTone(1046,'sine',0.15,0.3);playTone(1318,'sine',0.12,0.25,0.12);}
function playClick(){playTone(440,'sine',0.05,0.15);}
function playSticker(){playTone(880,'sine',0.1,0.25);playTone(1108,'sine',0.1,0.2,0.1);}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundToggle').textContent=soundOn?'🔊':'🔇';}

// ── Character ──
const CHARS=[
  {emoji:'🥚',xpNeeded:30},{emoji:'🐣',xpNeeded:60},{emoji:'🐥',xpNeeded:100},
  {emoji:'🐤',xpNeeded:150},{emoji:'🦆',xpNeeded:220},{emoji:'🦅',xpNeeded:320},{emoji:'🦄',xpNeeded:9999},
];
let xp=0,charLevel=0;
function addXP(amount){
  xp+=amount;
  if(xp>=CHARS[charLevel].xpNeeded&&charLevel<CHARS.length-1){charLevel++;levelUpAnim();}
  updateCharUI();
}
function updateCharUI(){
  const c=CHARS[charLevel];
  const prev=charLevel>0?CHARS[charLevel-1].xpNeeded:0;
  const needed=c.xpNeeded-prev;
  const cur=xp-prev;
  const pct=Math.min(cur/needed*100,100);
  const charStr=t('chars');
  document.getElementById('charDisplay').textContent=c.emoji;
  document.getElementById('charName').textContent=charStr[charLevel].name;
  document.getElementById('charLevel').textContent=tf('xpLabel',{lv:charLevel+1,cur,max:needed});
  document.getElementById('xpBar').style.width=pct+'%';
}
function levelUpAnim(){
  playLevelUp();
  const el=document.getElementById('charDisplay');
  el.classList.remove('bounce');void el.offsetWidth;el.classList.add('bounce');
  spawnParticles(['⭐','✨','🌟','💫'],window.innerWidth/2,window.innerHeight/2,12);
  showComboBanner(t('levelUp'),'#fbbf24');
}

// ── Stars ──
const TOTAL=10;
let starsEarned=0;
function initStars(){
  const row=document.getElementById('starsRow');row.innerHTML='';starsEarned=0;
  for(let i=0;i<TOTAL;i++){const s=document.createElement('span');s.className='star';s.textContent='⭐';s.id='star-'+i;row.appendChild(s);}
}
function earnStar(idx){
  const el=document.getElementById('star-'+idx);
  if(el&&!el.classList.contains('earned')){el.classList.add('earned');starsEarned++;playStar();}
}

// ── Stickers ──
const STICKER_EMOJIS=['🌟','🔥','💎','🚀','🏆'];
let earnedStickers=[];
function initStickers(){
  earnedStickers=[];
  const shelf=document.getElementById('stickerShelf');shelf.innerHTML='';
  STICKER_EMOJIS.forEach((emoji,i)=>{
    const s=document.createElement('span');s.className='sticker';s.textContent=emoji;
    s.id='sticker-'+i;
    const labels=t('stickers');s.title=labels[i].label;
    shelf.appendChild(s);
  });
}
function checkStickers(){
  const conds=[correct>=1,streak>=3,correct>=5,correct>=7,correct>=10];
  conds.forEach((cond,i)=>{
    const el=document.getElementById('sticker-'+i);
    if(cond&&el&&!el.classList.contains('earned')){
      el.classList.add('earned');earnedStickers.push(STICKER_EMOJIS[i]);playSticker();
      spawnParticles([STICKER_EMOJIS[i]],el.getBoundingClientRect().left+13,el.getBoundingClientRect().top,6);
    }
  });
}

// ── Particles ──
function spawnParticles(emojis,x,y,count=8){
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left=(x+Math.random()*80-40)+'px';p.style.top=(y+Math.random()*40-20)+'px';
    p.style.animationDelay=(Math.random()*0.2)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),1100);
  }
}
function spawnScorePop(text,x,y){
  const p=document.createElement('div');p.className='score-pop';p.textContent=text;
  p.style.left=x+'px';p.style.top=y+'px';
  document.body.appendChild(p);setTimeout(()=>p.remove(),800);
}
function showComboBanner(text,color='#4dd0ff'){
  const el=document.getElementById('comboBanner'),tx=document.getElementById('comboText');
  tx.textContent=text;tx.style.color=color;
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}
function doFlash(type){
  const el=document.getElementById('flash');el.className='flash';void el.offsetWidth;el.className='flash '+type;
}

// ── Game State ──
let stage=0,correct=0,qNum=1,streak=0,hintVisible=false,answered=false;
let a=2,b=2;
const problems=Array.from({length:TOTAL},()=>[Math.floor(Math.random()*8)+2,Math.floor(Math.random()*8)+2]);

function setStage(s){playClick();stage=s;[0,1,2].forEach(i=>document.getElementById('tab-'+i).classList.toggle('active',i===s));renderProblem();}

function renderProblemLabels(){
  if(!answered){
    document.getElementById('c-label').textContent=tf('cLabel',{a,b});
    document.getElementById('bar-desc').textContent=tf('barDesc',{a,b});
    document.getElementById('area-lbl').textContent=tf('areaLbl',{a,b});
  }
}

function renderProblem(){
  [a,b]=problems[(qNum-1)%TOTAL];
  document.getElementById('prob-display').textContent=a+' × '+b+' = ?';
  document.getElementById('fb').textContent='';document.getElementById('fb').className='feedback';
  document.getElementById('ans').value='';document.getElementById('ans').disabled=false;
  document.getElementById('next-btn').style.display='none';
  document.getElementById('nb-wrap').style.display='none';
  document.getElementById('hint-btn').textContent=t('hintShow');
  document.getElementById('sc-q').textContent=qNum+' / '+TOTAL;
  document.getElementById('prog').style.width=Math.min(((qNum-1)/TOTAL)*100,100)+'%';
  document.getElementById('card-streak').classList.remove('combo-active');
  hintVisible=false;answered=false;
  if(stage===0)renderConcrete();
  else if(stage===1)renderPictorial();
  else renderAbstract();
}

function renderConcrete(){
  document.getElementById('stage-c').style.display='block';
  document.getElementById('stage-p').style.display='none';
  document.getElementById('stage-a').style.display='none';
  document.getElementById('c-label').textContent=tf('cLabel',{a,b});
  const gc=document.getElementById('c-groups');gc.innerHTML='';
  for(let g=0;g<b;g++){
    const grp=document.createElement('div');grp.className='block-group';
    const lbl=document.createElement('div');lbl.className='g-lbl';lbl.textContent=(g+1);
    grp.appendChild(lbl);
    const dr=document.createElement('div');dr.className='dots-row';
    for(let d=0;d<a;d++){
      const dot=document.createElement('div');dot.className='dot';
      dot.addEventListener('click',function(){
        playClick();this.classList.toggle('counted');
        document.getElementById('ans').value=document.querySelectorAll('.dot.counted').length||'';
      });
      dr.appendChild(dot);
    }
    grp.appendChild(dr);gc.appendChild(grp);
  }
  buildNumpad();
}

function renderPictorial(){
  document.getElementById('stage-c').style.display='none';
  document.getElementById('stage-p').style.display='block';
  document.getElementById('stage-a').style.display='none';
  document.getElementById('bar-desc').textContent=tf('barDesc',{a,b});
  const br=document.getElementById('bar-rows');br.innerHTML='';
  const uw=Math.min(Math.floor(300/Math.max(a,1)),26);
  for(let i=0;i<b;i++){
    const row=document.createElement('div');row.className='bar-row';
    const n=document.createElement('div');n.className='bar-num';n.textContent=i+1;
    const bar=document.createElement('div');bar.className='bar-fill';
    bar.style.width=Math.max(uw*a,24)+'px';bar.textContent=a;
    row.appendChild(n);row.appendChild(bar);br.appendChild(row);
  }
  const grid=document.getElementById('area-grid');
  const cs=Math.min(21,Math.floor(480/Math.max(b,1)));
  grid.style.gridTemplateColumns='repeat('+b+', '+cs+'px)';
  document.getElementById('area-lbl').textContent=tf('areaLbl',{a,b});
  grid.innerHTML='';
  for(let idx=0;idx<a*b;idx++){
    const cell=document.createElement('div');cell.className='area-cell';
    cell.style.width=cs+'px';cell.style.height=cs+'px';cell.dataset.idx=idx;
    cell.addEventListener('click',function(){
      playClick();const cl=parseInt(this.dataset.idx);
      document.querySelectorAll('.area-cell').forEach(c=>parseInt(c.dataset.idx)<=cl?c.classList.add('filled'):c.classList.remove('filled'));
      document.getElementById('ans').value=cl+1;
    });
    grid.appendChild(cell);
  }
  buildNumpad();
}

function renderAbstract(){
  document.getElementById('stage-c').style.display='none';
  document.getElementById('stage-p').style.display='none';
  document.getElementById('stage-a').style.display='block';
  buildNumpad();
}

function buildNumpad(){
  const np=document.getElementById('numpad');np.innerHTML='';
  ['1','2','3','4','5','6','7','8','9','0','00','⌫'].forEach(k=>{
    const btn=document.createElement('button');btn.className='nk'+(k==='⌫'?' del':'');btn.textContent=k;
    btn.addEventListener('click',()=>{
      if(answered)return;playClick();
      const inp=document.getElementById('ans');
      if(k==='⌫')inp.value=inp.value.slice(0,-1);
      else inp.value=(inp.value+k).replace(/^0+(\d)/,'$1');
    });
    np.appendChild(btn);
  });
}

function getNBonds(){
  let sp1,sp2;
  if(b>=6){sp1=5;sp2=b-5;}else if(b>=4){sp1=2;sp2=b-2;}else{sp1=1;sp2=b-1;}
  return{sp1,sp2,r1:a*sp1,r2:a*sp2};
}
function renderHint(){
  const{sp1,sp2,r1,r2}=getNBonds();
  document.getElementById('nb-row').innerHTML=
    `<div class="nb-box">${a} × ${b}</div><div class="nb-plus">=</div>`+
    `<div class="nb-box">${a} × ${sp1}</div><div class="nb-plus">+</div><div class="nb-box">${a} × ${sp2}</div>`+
    `<div class="nb-plus">=</div><div class="nb-box hi">${r1}</div><div class="nb-plus">+</div>`+
    `<div class="nb-box hi">${r2}</div><div class="nb-plus">=</div><div class="nb-box hi">${r1+r2}</div>`;
  document.querySelector('.nb-title').textContent=t('hintTitle');
}
function toggleHint(){
  hintVisible=!hintVisible;
  document.getElementById('nb-wrap').style.display=hintVisible?'block':'none';
  document.getElementById('hint-btn').textContent=hintVisible?t('hintHide'):t('hintShow');
  if(hintVisible)renderHint();
}

function checkAnswer(){
  if(answered)return;resumeAC();
  const val=parseInt(document.getElementById('ans').value);
  const fb=document.getElementById('fb');
  if(isNaN(val)){fb.textContent=t('enterNum');fb.className='feedback ng';return;}
  answered=true;document.getElementById('ans').disabled=true;
  if(val===a*b){
    correct++;streak++;
    document.getElementById('sc-correct').textContent=correct;
    document.getElementById('sc-streak').textContent='🔥 '+streak;
    const xpGain=streak>=3?15:10;addXP(xpGain);
    earnStar(correct-1);
    const rect=document.getElementById('ans').getBoundingClientRect();
    spawnScorePop(streak>=3?'+'+xpGain+' XP ⚡':'+'+xpGain+' XP',rect.left+rect.width/2,rect.top);
    const emojis=streak>=5?['🌟','💎','🎉','✨']:streak>=3?['⭐','🔥','✨']:['⭐','✨'];
    spawnParticles(emojis,rect.left+rect.width/2,rect.top,streak>=3?12:7);
    if(streak===3){playCombo();showComboBanner(t('combo3'),'#f78a3a');}
    else if(streak===5){playCombo();showComboBanner(t('combo5'),'#a78bfa');}
    else if(streak===7){playCombo();showComboBanner(t('combo7'),'#4dd0ff');}
    else if(streak>=10){playCombo();showComboBanner(t('combo10'),'#fbbf24');}
    else playCorrect();
    if(streak>=3)document.getElementById('card-streak').classList.add('combo-active');
    const msgs=t('feedCorrect');
    fb.textContent=msgs[Math.floor(Math.random()*msgs.length)];fb.className='feedback ok';
    doFlash('correct-flash');
    if(stage===1)document.querySelectorAll('.area-cell').forEach(c=>c.classList.add('filled'));
    const cd=document.getElementById('charDisplay');cd.classList.remove('bounce');void cd.offsetWidth;cd.classList.add('bounce');
  }else{
    streak=0;document.getElementById('sc-streak').textContent='🔥 0';
    document.getElementById('card-streak').classList.remove('combo-active');
    fb.textContent=tf('feedWrong',{ans:a*b});fb.className='feedback ng';
    playWrong();doFlash('wrong-flash');
    hintVisible=true;document.getElementById('nb-wrap').style.display='block';
    document.getElementById('hint-btn').textContent=t('hintHide');renderHint();
    addXP(2);
  }
  checkStickers();
  const nb=document.getElementById('next-btn');
  nb.style.display='block';
  nb.textContent=qNum<TOTAL?t('nextBtn'):t('finishBtn');
  document.getElementById('card-correct').classList.add('pulse');
  setTimeout(()=>document.getElementById('card-correct').classList.remove('pulse'),400);
}

function nextQuestion(){
  playClick();if(qNum>=TOTAL){showResult();return;}qNum++;renderProblem();
}

function showResult(){
  const pct=Math.round(correct/TOTAL*100);
  const char=CHARS[charLevel];
  const charNames=t('chars');
  const starsHTML='⭐'.repeat(starsEarned)+'☆'.repeat(TOTAL-starsEarned);
  const stickersHTML=earnedStickers.join(' ');
  const subs=t('resultSub');
  const sub=correct>=8?subs[0]:correct>=5?subs[1]:subs[2];
  if(correct>=8)playLevelUp();else if(correct>=5)playCombo();else playCorrect();
  document.getElementById('game-area').innerHTML=`
    <div class="result-wrap">
      <div class="result-char">${char.emoji}</div>
      <div class="result-title">${tf('resultTitle',{correct,total:TOTAL})}</div>
      <div class="result-sub">${sub}</div>
      <div class="result-stars">${starsHTML}</div>
      ${stickersHTML?`<div class="result-stickers">${stickersHTML}</div>`:''}
      <div class="result-stat"><div class="rs-l">${t('resultAccuracy')}</div><div class="rs-v">${pct}%</div></div><br>
      <button class="replay-btn" onclick="location.reload()">${t('replayBtn')}</button>
      <a class="hub-btn" href="https://game.mybumo.com">${t('hubBtn')}</a>
    </div>`;
  spawnParticles(['🌟','⭐','✨','🎉','🏆'],window.innerWidth/2,window.innerHeight/3,16);
}

document.getElementById('ans').addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});

// Init
initStars();
initStickers();
updateCharUI();
applyLang();
renderProblem();
</script>
</body>
